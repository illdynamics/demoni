name: CI

on: [push, pull_request]

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Static checks — shell syntax, lint, permissions, secrets, whitespace
  # ═══════════════════════════════════════════════════════════════════
  static:
    name: Static Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Shell syntax (bash -n)
        run: |
          for f in demoni install.sh bin/demoni bin/demoni-entrypoint bin/demoni-healthcheck bin/demoni-print-config; do
            [ -f "$f" ] || continue
            bash -n "$f" || { echo "FAIL: bash -n $f"; exit 1; }
          done
          echo "All shell syntax OK"

      - name: ShellCheck
        run: shellcheck demoni install.sh bin/demoni bin/demoni-entrypoint bin/demoni-healthcheck bin/demoni-print-config || true

      - name: Executable permissions
        run: |
          for f in demoni install.sh bin/demoni bin/demoni-entrypoint bin/demoni-healthcheck bin/demoni-print-config; do
            [ -f "$f" ] || continue
            test -x "$f" || { echo "FAIL: not executable — $f"; exit 1; }
          done
          echo "All executables OK"

      - name: Secret scan
        run: |
          if git grep -n -E 'sk-[a-zA-Z0-9]{20,}' -- '*.sh' '*.ts' '*.js' '*.yml' '*.yaml' ':!gemini-cli/' ':!node_modules/' ':!bridge/node_modules/' 2>/dev/null; then
            echo "FAIL: potential API key in source files"
            exit 1
          fi
          echo "Secret scan: PASS"

      - name: Git whitespace
        run: git diff --check

  # ═══════════════════════════════════════════════════════════════════
  # Build, typecheck, test
  # ═══════════════════════════════════════════════════════════════════
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [static]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install root deps
        run: npm ci
      - name: Install bridge deps
        run: cd bridge && npm ci
      - name: Build
        run: npm run build
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test:ci

  # ═══════════════════════════════════════════════════════════════════
  # Package — verify npm pack hygiene
  # ═══════════════════════════════════════════════════════════════════
  package:
    name: Package Check
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install root deps
        run: npm ci
      - name: Build
        run: npm run build
      - name: Package dry-run
        run: npm pack --dry-run
      - name: Release hygiene
        run: npm run check:release-hygiene

  # ═══════════════════════════════════════════════════════════════════
  # Docker — build image and smoke test
  # ═══════════════════════════════════════════════════════════════════
  docker:
    name: Docker Smoke
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t demoni:ci .
      - name: Smoke — help
        run: docker run --rm demoni:ci --help
      - name: Smoke — version
        run: docker run --rm demoni:ci --version
      - name: Smoke — with key
        run: docker run --rm -e DEEPSEEK_API_KEY=sk-test-key demoni:ci --version
      - name: Smoke — gemini CLI available
        run: |
          docker run --rm demoni:ci gemini --version
          echo "Gemini CLI inside container: OK"
      - name: Smoke — bridge server starts
        run: |
          docker run --rm -d --name demoni-bridge-ci \
            --entrypoint node \
            -e DEEPSEEK_API_KEY=sk-test-key \
            -e DEMONI_BRIDGE_AUTO_START=1 \
            demoni:ci /opt/demoni/bridge/dist/server.js
          sleep 2
          docker exec demoni-bridge-ci curl -sf http://127.0.0.1:7654/health
          echo ""
          docker exec demoni-bridge-ci curl -sf http://127.0.0.1:7654/v1/models
          docker stop demoni-bridge-ci
      - name: Smoke — config generation
        run: |
          docker run --rm -e DEEPSEEK_API_KEY=sk-test-key demoni:ci node /opt/demoni/dist/cli.js --help | grep -q 'Demoni'
          echo "CLI config generation: OK"
      - name: Smoke — model catalog in container
        run: |
          docker run --rm --entrypoint cat demoni:ci /opt/demoni/config/model-catalog.json | grep -q 'v4-flash'
          echo "Model catalog present: OK"

  # ═══════════════════════════════════════════════════════════════════
  # Release — only runs on version tags (v*), after all 4 checks pass
  # ═══════════════════════════════════════════════════════════════════
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [static, test, package, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Extract tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="demoni-${TAG}.zip"
          git archive --format=zip --prefix="demoni-${TAG}/" --output="${ARCHIVE}" HEAD
          echo "archive=${ARCHIVE}" >> "${GITHUB_ENV}"
          echo "tag=${TAG}" >> "${GITHUB_ENV}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.tag }}
          name: "Demoni ${{ env.tag }}"
          body: |
            ## Demoni ${{ env.tag }}

            ### Install

            ```bash
            curl -fsSL https://github.com/illdynamics/demoni/releases/download/${{ env.tag }}/demoni-${{ env.tag }}.zip -o demoni.zip
            unzip demoni.zip
            cd demoni-${{ env.tag }}
            ./demoni install
            ```

            ### Quick Start

            ```bash
            export PATH="${HOME}/bin:${PATH}"
            export DEEPSEEK_API_KEY="sk-..."
            demoni --help
            ```

            See [RELEASE-NOTES.md](https://github.com/illdynamics/demoni/blob/main/RELEASE-NOTES.md) for full changelog.
          files: ${{ env.archive }}
          generate_release_notes: false
