name: Release

on:
  workflow_run:
    workflows: [CI]
    types:
      - completed

jobs:
  ################################################################
  # DISPATCHER — The actual release job now lives inside ci.yml
  # as a job that runs after all 4 checks (static, test, package,
  # docker) and only fires on version tags (v*).
  #
  # This trigger is kept as a convenience so the Release workflow
  # still appears in the UI for visibility, but it no longer does
  # any work itself. The real release logic runs inline in the CI
  # workflow so it shows up as a visible step in the pipeline.
  ################################################################
  placeholder:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Release is handled inside .github/workflows/ci.yml — look for the 'Release' job there."
